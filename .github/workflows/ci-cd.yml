name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker Image
#        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app .
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.run_number }} .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
#        run: docker push ${{ secrets.DOCKER_USERNAME }}/demo-app
        run: docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.run_number }}


